<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Where It All Began — Print Optimized</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>

  <style>
    :root {
      --paper: #f8f4ee;
      --panel: rgba(255, 252, 248, 0.94);
      --panel-print: #fffdf9;
      --text: #1f1a17;
      --muted: #6d6158;
      --accent: #b84b68;
      --accent-soft: #d89aab;
      --border: rgba(72, 52, 43, 0.12);
      --shadow: rgba(43, 25, 18, 0.16);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--paper);
      color: var(--text);
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      overscroll-behavior: none;
    }

    body {
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100dvh;
      min-height: 100vh;
      overflow: hidden;
      background: var(--paper);
    }

    #map {
      position: absolute;
      inset: 0;
    }

    .poster {
      position: absolute;
      top: 80px;
      left: 32px;
      width: 520px;
      max-height: calc(100% - 52px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 2;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 20px 60px var(--shadow);
      backdrop-filter: blur(10px) saturate(1.1);
      padding: 28px 28px 24px 28px;
      scrollbar-width: thin;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34pt;
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: -0.6px;
      color: #211815;
      white-space: nowrap;
      text-align: center;
    }

    h2 {
      margin: 10px 0 0 0;
      text-align: center;
      font-family: "Amiri", "Noto Naskh Arabic", Georgia, serif;
      font-size: 22px;
      line-height: 1.5;
      font-weight: 700;
      color: #6e4d57;
    }

    .location {
      margin-top: 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 20px;
      line-height: 1.45;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
    }

    .names {
      margin-top: 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      line-height: 1.45;
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }

    .date {
      margin-top: 10px;
      font-size: 22px;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 500;
      text-align: center;
    }

    .divider {
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(184, 75, 104, 0.55),
        transparent
      );
      margin: 18px 0 20px 0;
    }

    .places {
      margin: 0;
      padding: 0;
      list-style: none;
      text-align: left;
    }

    .places li {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 14px;
      margin-bottom: 16px;
      align-items: start;
      padding: 10px 8px;
      border-radius: 16px;
      transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
    }

    .places li:hover {
      background: rgba(255, 255, 255, 0.55);
    }

    .places li:active {
      transform: scale(0.992);
    }

    .places li.active {
      background: rgba(184, 75, 104, 0.09);
      box-shadow: inset 0 0 0 1px rgba(184, 75, 104, 0.18);
    }

    .places li:last-child {
      margin-bottom: 4px;
    }

    .num {
      position: relative;
      width: 24px;
      height: 24px;
      background: var(--accent);
      transform: rotate(-45deg);
      margin-top: 7px;
      margin-left: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      filter: drop-shadow(0 3px 7px rgba(184, 75, 104, 0.20));
    }

    .num::before,
    .num::after {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 50%;
    }

    .num::before {
      top: -12px;
      left: 0;
    }

    .num::after {
      top: 0;
      left: 12px;
    }

    .num span {
      position: relative;
      z-index: 1;
      transform: rotate(45deg) translateY(-3px);
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      line-height: 1;
    }

    .place-name {
      font-size: 16px;
      line-height: 1.35;
      color: var(--text);
      font-weight: 700;
    }

    .place-activity {
      font-size: 16px;
      line-height: 1.55;
      color: #8b5d6c;
      margin-top: 4px;
      font-style: italic;
    }

    .controls {
      margin-top: 22px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button,
    select {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.01em;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    button:hover,
    select:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 10px 24px rgba(184, 75, 104, 0.22);
    }

    .secondary,
    select {
      background: rgba(255,255,255,0.88);
      color: var(--text);
      border: 1px solid rgba(72, 52, 43, 0.12);
    }

    select {
      outline: none;
      min-width: 135px;
      appearance: none;
      -webkit-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #6d6158 50%),
        linear-gradient(135deg, #6d6158 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 3px),
        calc(100% - 12px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 34px;
    }

    .mapboxgl-popup-content {
      background: #fffdf8;
      color: var(--text);
      border-radius: 16px;
      padding: 13px 15px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
      font-size: 13px;
      line-height: 1.5;
    }

    .mapboxgl-popup-tip {
      border-top-color: #fffdf8 !important;
      border-bottom-color: #fffdf8 !important;
    }

    .popup-title {
      font-weight: 800;
      margin-bottom: 5px;
      color: #7a3148;
    }

    .popup-activity {
      color: #8b5d6c;
      margin-bottom: 5px;
      font-style: italic;
    }

    @page {
      size: 11in 17in landscape;
      margin: 0;
    }

    @media print {
      html, body {
        width: 17in;
        height: 11in;
        background: #ffffff !important;
        overflow: visible;
      }

      #app {
        height: auto;
        overflow: visible;
      }

      #map {
        position: fixed;
        inset: 0;
      }

      .poster {
        top: 0.5in;
        left: 0.45in;
        width: 5.4in;
        max-height: calc(100% - 0.9in);
        overflow: hidden;
        background: var(--panel-print) !important;
        border: 1px solid rgba(72, 52, 43, 0.14) !important;
        box-shadow: 0 8px 22px rgba(0,0,0,0.08) !important;
        backdrop-filter: none !important;
        padding: 0.34in 0.34in 0.28in 0.34in;
        border-radius: 0.22in;
      }

      h1,
      .location,
      .names,
      .date,
      .caption,
      h2 {
        text-align: center;
      }

      .places {
        text-align: left;
      }

      .location {
        font-size: 20pt;
      }

      .names {
        font-size: 24pt;
      }

      .date,
      .caption {
        font-size: 20pt;
      }

      .place-name {
        font-size: 18px;
        line-height: 1.35;
        font-weight: 700;
      }

      .place-activity {
        font-size: 16px;
        line-height: 1.6;
      }

      .places li {
        margin-bottom: 0.14in;
        text-align: left;
      }

      .controls,
      .mapboxgl-ctrl-top-right,
      .mapboxgl-ctrl-bottom-right,
      .mapboxgl-ctrl-bottom-left,
      .mapboxgl-ctrl-top-left,
      .mapboxgl-popup {
        display: none !important;
      }
    }

    @media (max-width: 768px) {
      body {
        overflow: hidden;
      }

      #app {
        display: grid;
        grid-template-rows: 42dvh 1fr;
        height: 100dvh;
      }

      #map {
        position: sticky;
        top: 0;
        height: 42dvh;
        min-height: 300px;
        z-index: 1;
      }

      .poster {
        position: relative;
        top: 0;
        left: 0;
        width: 100%;
        max-height: none;
        height: 100%;
        overflow: auto;
        border-radius: 26px 26px 0 0;
        padding: 18px 16px calc(18px + var(--safe-bottom)) 16px;
        box-shadow: 0 -8px 30px rgba(43, 25, 18, 0.10);
        backdrop-filter: blur(10px) saturate(1.06);
        background: rgba(255, 252, 248, 0.97);
        border-left: none;
        border-right: none;
        border-bottom: none;
        margin-top: -18px;
        z-index: 2;
      }

      .poster::before {
        content: "";
        display: block;
        width: 46px;
        height: 5px;
        border-radius: 999px;
        background: rgba(109, 97, 88, 0.24);
        margin: 2px auto 14px auto;
      }

      h1 {
        font-size: 29px;
        line-height: 1.05;
        white-space: normal;
        letter-spacing: -0.4px;
      }

      h2 {
        font-size: 16px;
        line-height: 1.7;
        margin-top: 8px;
        padding: 0 4px;
      }

      .location {
        margin-top: 10px;
        font-size: 12px;
        letter-spacing: 0.18em;
        line-height: 1.45;
      }

      .names {
        margin-top: 10px;
        font-size: 19px;
      }

      .date {
        margin-top: 8px;
        font-size: 15px;
      }

      .divider {
        margin: 16px 0 16px 0;
      }

      .places li {
        grid-template-columns: 34px 1fr;
        gap: 10px;
        margin-bottom: 10px;
        padding: 11px 8px;
        border-radius: 14px;
      }

      .num {
        width: 18px;
        height: 18px;
        margin-top: 6px;
        margin-left: 4px;
      }

      .num::before,
      .num::after {
        width: 18px;
        height: 18px;
      }

      .num::before {
        top: -9px;
      }

      .num::after {
        left: 9px;
      }

      .num span {
        font-size: 11px;
        transform: rotate(45deg) translateY(-2px);
      }

      .place-name {
        font-size: 14px;
        line-height: 1.33;
      }

      .place-activity {
        font-size: 13px;
        line-height: 1.45;
        margin-top: 3px;
      }

      .controls {
        margin-top: 18px;
        flex-direction: column;
        gap: 9px;
      }

      button,
      select {
        width: 100%;
        padding: 13px 16px;
        font-size: 15px;
      }

      .mapboxgl-ctrl-top-right {
        top: calc(10px + var(--safe-top));
        right: 10px;
      }
    }

    #export-stage {
      position: fixed;
      left: -99999px;
      top: 0;
      width: 5100px;
      height: 3300px;
      overflow: hidden;
      background: #ffffff;
      z-index: -1;
    }

    #export-map {
      position: absolute;
      inset: 0;
    }

    #export-poster {
      position: absolute;
      top: 150px;
      left: 135px;
      width: 1620px;
      max-height: 3000px;
      overflow: hidden;
      z-index: 2;
      background: #fffdf9;
      border: 1px solid rgba(72, 52, 43, 0.14);
      border-radius: 66px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.08);
      padding: 102px 102px 84px 102px;
      color: var(--text);
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
    }

    #export-poster h1 {
      margin: 0;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 102pt;
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: -1.8px;
      color: #211815;
      white-space: nowrap;
    }

    #export-poster .location {
      margin-top: 30px;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 60pt;
      line-height: 1.35;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    #export-poster .names {
      margin-top: 30px;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 66pt;
      line-height: 1.35;
      font-weight: 700;
      color: var(--text);
    }

    #export-poster .date {
      margin-top: 24px;
      text-align: center;
      font-size: 60pt;
      line-height: 1.35;
      color: var(--muted);
      font-weight: 500;
    }

    #export-poster .divider {
      height: 3px;
      background: linear-gradient(to right, transparent, rgba(184, 75, 104, 0.55), transparent);
      margin: 54px 0 60px 0;
    }

    #export-poster .places {
      margin: 0;
      padding: 0;
      list-style: none;
      text-align: left;
    }

    #export-poster .places li {
      display: grid;
      grid-template-columns: 126px 1fr;
      gap: 42px;
      margin-bottom: 42px;
      align-items: start;
    }

    #export-poster .num {
      position: relative;
      width: 72px;
      height: 72px;
      background: var(--accent);
      transform: rotate(-45deg);
      margin-top: 18px;
      margin-left: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      filter: drop-shadow(0 8px 18px rgba(184, 75, 104, 0.20));
    }

    #export-poster .num::before,
    #export-poster .num::after {
      content: "";
      position: absolute;
      width: 72px;
      height: 72px;
      background: var(--accent);
      border-radius: 50%;
    }

    #export-poster .num::before {
      top: -36px;
      left: 0;
    }

    #export-poster .num::after {
      top: 0;
      left: 36px;
    }

    #export-poster .num span {
      position: relative;
      z-index: 1;
      transform: rotate(45deg) translateY(-7px);
      color: #fff;
      font-weight: 800;
      font-size: 44px;
      line-height: 1;
    }

    #export-poster .place-name {
      font-size: 48px;
      line-height: 1.3;
      color: var(--text);
      font-weight: 700;
    }

    #export-poster .place-activity {
      font-size: 42px;
      line-height: 1.5;
      color: #8b5d6c;
      margin-top: 10px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div class="poster" id="poster-panel">
      <h1>Where It All Began</h1>
      <h2>من هنا بسم الله التقينا وعلى الله توكلنا</h2>

      <div class="location">Louisville, Kentucky</div>
      <div class="names">Adel &amp; Salsabeel</div>
      <div class="date">April 3–5, 2026</div>

      <div class="divider"></div>

      <ul class="places" id="places-list"></ul>

      <div class="controls">
		<select id="basemap-select" onchange="changeBasemap(this.value)">
		  <option value="light">Light</option>
		  <option value="streets" selected>Streets</option>
		  <option value="outdoors">Outdoors</option>
		  <option value="satellite">Satellite</option>
		</select>

        <button class="primary" onclick="fitAll()">Fit map</button>
        <button class="secondary" onclick="window.print()">Print 11×17 PDF</button>
      </div>
    </div>
  </div>

  <div id="export-stage" aria-hidden="true">
    <div id="export-map"></div>
    <div id="export-poster">
      <h1>Where It All Began</h1>
      <div class="location">Louisville, Kentucky</div>
      <div class="names">Adel &amp; Salsabeel</div>
      <div class="date">April 3–5, 2026</div>
      <div class="divider"></div>
      <ul class="places" id="export-places-list"></ul>
    </div>
  </div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiYWFiZGFsYWgiLCJhIjoiY21udmI3c2ZzMTdhMjJ0b256YnF5ZHVwbCJ9.mQt7Ce_CWnI-ghiUG_yxRw';

    const BASEMAPS = {
      streets: "mapbox://styles/mapbox/streets-v12",
      light: "mapbox://styles/mapbox/light-v11",
      outdoors: "mapbox://styles/mapbox/outdoors-v12",
      satellite: "mapbox://styles/mapbox/satellite-streets-v12"
    };

    let currentBasemap = "streets";

    const places = [
      {
        order: 1,
        name: "The Quad Apartments",
        activity: "Our first moment face to face",
        address: "600 Marshall St, Louisville, KY 40202",
        coordinates: [-85.7585, 38.2520]
      },
      {
        order: 2,
        name: "The Cheesecake Factory",
        activity: "Our first morning together",
        address: "5000 Shelbyville Rd #1585, Louisville, KY 40207",
        coordinates: [-85.6247, 38.2487]
      },
      {
        order: 3,
        name: "The Muslim Community Center of Louisville",
        activity: "Where our hearts found connection through faith",
        address: "8215 Old Westport Rd, Louisville, KY 40222",
        coordinates: [-85.6188, 38.2672]
      },
      {
        order: 4,
        name: "OVRDRIVE, Louisville",
        activity: "Laughing and letting go",
        address: "112 W Jefferson St, Louisville, KY 40202",
        coordinates: [-85.7607, 38.2565]
      },
      {

        name: "Walmart Supercenter",

        address: "12981 Shelbyville Rd, Louisville, KY 40243",
        coordinates: [-85.5085, 38.2458]
      },
      {
        order: 6,
        name: "Olive Garden Italian Restaurant",
        activity: "Dinner and quiet moments",
        address: "9730 Von Allmen Ct, Louisville, KY 40241",
        coordinates: [-85.5765, 38.2858]
      },
      {
        order: 7,
        name: "The Grape Leaf",
        activity: "Brunch and the colors of the Easter Parade",
        address: "2217 Frankfort Ave, Louisville, KY 40206",
        coordinates: [-85.7119, 38.2562]
      },
      {
        order: 8,
        name: "Bernheim Forest and Arboretum",
        activity: "Finding peace together in nature",
        address: "2075 Clermont Road, Clermont, KY 40110",
        coordinates: [-85.6465, 37.9247]
      },
      {
        order: 9,
        name: "Outback Steakhouse",
        activity: "Dinner, when pink said everything",
        address: "9498 Brownsboro Rd, Louisville, KY 40241",
        coordinates: [-85.5820, 38.2870]
      },
      {
        order: 10,
        name: "Starbucks Coffee Company",
        activity: "Coffee and conversations that lingered",
        address: "3702 Frankfort Ave, Louisville, KY 40207",
        coordinates: [-85.7001, 38.2547]
      }
    ];

    const displayOffsets = {
      1: [-85.773, 38.2495],
      4: [-85.7540, 38.2595],
      7: [-85.7185, 38.2585],
      10: [-85.6940, 38.2540],
      6: [-85.60, 38.2920],
      9: [-85.5750, 38.2820]
    };

    const geojson = {
      type: "FeatureCollection",
      features: places.map((p) => ({
        type: "Feature",
        properties: {
          id: p.order,
          name: p.name,
          activity: p.activity,
          address: p.address,
          trueCoordinates: JSON.stringify(p.coordinates)
        },
        geometry: {
          type: "Point",
          coordinates: displayOffsets[p.order] || p.coordinates
        }
      }))
    };

    const kentuckyLabelGeojson = {
      type: "FeatureCollection",
      features: [
        {
          type: "Feature",
          properties: { name: "KENTUCKY" },
          geometry: {
            type: "Point",
            coordinates: [-85.67, 38.14]
          }
        }
      ]
    };

    const ohioRiverLabelGeojson = {
      type: "FeatureCollection",
      features: [
        {
          type: "Feature",
          properties: { name: "Ohio River" },
          geometry: {
            type: "Point",
            coordinates: [-85.865, 38.20]
          }
        }
      ]
    };

    const louisvilleCustomLabelGeojson = {
      type: "FeatureCollection",
      features: [
        {
          type: "Feature",
          properties: { name: "Louisville" },
          geometry: {
            type: "Point",
            coordinates: [-85.705, 38.205]
          }
        }
      ]
    };

    let map;
    let activePopup = null;
    let selectedOrder = null;

    function isMobileLayout() {
      return window.matchMedia("(max-width: 768px)").matches;
    }

    function populatePlacesList(containerId) {
      const list = document.getElementById(containerId);
      list.innerHTML = "";

      places.forEach((p) => {
        const li = document.createElement("li");
        li.dataset.order = String(p.order);
        li.setAttribute("role", "button");
        li.setAttribute("tabindex", "0");
        li.setAttribute("aria-label", `${p.order}. ${p.name}. ${p.activity}`);

        li.innerHTML = `
          <div class="num"><span>${p.order}</span></div>
          <div>
            <div class="place-name">${p.name}</div>
            <div class="place-activity">${p.activity}</div>
          </div>
        `;

        li.addEventListener("click", () => focusPlace(p.order));
        li.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            focusPlace(p.order);
          }
        });

        list.appendChild(li);
      });
    }

    function populateExportPlacesList(containerId) {
      const list = document.getElementById(containerId);
      list.innerHTML = "";
      places.forEach((p) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <div class="num"><span>${p.order}</span></div>
          <div>
            <div class="place-name">${p.name}</div>
            <div class="place-activity">${p.activity}</div>
          </div>
        `;
        list.appendChild(li);
      });
    }

    function setActiveListItem(order) {
      selectedOrder = order;
      document.querySelectorAll(".places li").forEach((el) => {
        el.classList.toggle("active", order !== null && Number(el.dataset.order) === order);
      });
    }

    function scrollListItemIntoView(order) {
      const el = document.querySelector(`#places-list li[data-order="${order}"]`);
      if (!el) return;

      el.scrollIntoView({
        behavior: "smooth",
        block: "nearest"
      });
    }

    function getPlaceByOrder(order) {
      return places.find(p => p.order === order);
    }

    function openPopupForPlace(place) {
      if (!place) return;

      if (activePopup) {
        activePopup.remove();
      }

      activePopup = new mapboxgl.Popup({ offset: isMobileLayout() ? 14 : 18 })
        .setLngLat(place.coordinates)
        .setHTML(`
          <div class="popup-title">${place.order}. ${place.name}</div>
          <div class="popup-activity">${place.activity}</div>
          <div>${place.address}</div>
        `)
        .addTo(map);
    }

    function flyToPlace(place) {
      if (!place) return;

      map.flyTo({
        center: place.coordinates,
        zoom: isMobileLayout() ? 11.9 : 12.3,
        speed: 0.9,
        curve: 1.3,
        essential: true,
        offset: isMobileLayout() ? [0, -60] : [180, 0]
      });
    }

    function focusPlace(order) {
      const place = getPlaceByOrder(order);
      if (!place) return;

      setActiveListItem(order);
      flyToPlace(place);
      openPopupForPlace(place);
      scrollListItemIntoView(order);
    }

    function fitBoundsOnMap(targetMap, isExport = false) {
      const bounds = new mapboxgl.LngLatBounds();

      places.forEach((p) => bounds.extend(p.coordinates));
      bounds.extend(kentuckyLabelGeojson.features[0].geometry.coordinates);
      bounds.extend(ohioRiverLabelGeojson.features[0].geometry.coordinates);

      let padding;

      if (isExport) {
        padding = { top: 180, bottom: 260, left: 1800, right: 220 };
      } else if (isMobileLayout()) {
        padding = { top: 50, bottom: 70, left: 35, right: 35 };
      } else {
        padding = { top: 60, bottom: 90, left: 600, right: 70 };
      }

      targetMap.fitBounds(bounds, {
        padding,
        duration: 0,
        maxZoom: 10.7
      });
    }

    function fitAll() {
      fitBoundsOnMap(map, false);

      if (activePopup) {
        activePopup.remove();
        activePopup = null;
      }

      setActiveListItem(null);
    }

    function bindMapInteractions(targetMap) {
      targetMap.on("click", "point-hearts", (e) => {
        const feature = e.features[0];
        const order = Number(feature.properties.id);
        focusPlace(order);
      });

      targetMap.on("click", "point-hitbox", (e) => {
        const feature = e.features[0];
        const order = Number(feature.properties.id);
        focusPlace(order);
      });

      targetMap.on("mouseenter", "point-hearts", () => {
        targetMap.getCanvas().style.cursor = "pointer";
      });

      targetMap.on("mouseleave", "point-hearts", () => {
        targetMap.getCanvas().style.cursor = "";
      });

      targetMap.on("mouseenter", "point-hitbox", () => {
        targetMap.getCanvas().style.cursor = "pointer";
      });

      targetMap.on("mouseleave", "point-hitbox", () => {
        targetMap.getCanvas().style.cursor = "";
      });
    }

    function applyMapStyling(targetMap) {
      targetMap.addSource("places", {
        type: "geojson",
        data: geojson
      });

      targetMap.addSource("kentucky-label", {
        type: "geojson",
        data: kentuckyLabelGeojson
      });

      targetMap.addSource("ohio-river-label", {
        type: "geojson",
        data: ohioRiverLabelGeojson
      });

      targetMap.addSource("louisville-custom-label", {
        type: "geojson",
        data: louisvilleCustomLabelGeojson
      });

      const layers = targetMap.getStyle().layers || [];

      for (const layer of layers) {
        if (!layer.layout || !layer.layout["text-field"]) continue;

        const id = layer.id || "";

        if (id.includes("poi") || id.includes("transit") || id.includes("road-number")) {
          try {
            targetMap.setLayoutProperty(id, "visibility", "none");
          } catch (e) {}
        }

        if (id.includes("settlement") || id.includes("place-label")) {
          try {
            targetMap.setLayoutProperty(id, "text-allow-overlap", false);
            targetMap.setLayoutProperty(id, "text-variable-anchor", ["top", "bottom", "left", "right"]);
            targetMap.setLayoutProperty(id, "text-radial-offset", 2.4);
            targetMap.setPaintProperty(id, "text-halo-color", "rgba(255,255,255,0.92)");
            targetMap.setPaintProperty(id, "text-halo-width", 1.6);
          } catch (e) {}
        }
      }

      const heartSize = isMobileLayout() ? 40 : 50;
      const numberSize = isMobileLayout() ? 14 : 18;
      const kentuckyLabelSize = isMobileLayout() ? 24 : 35;
      const riverLabelSize = isMobileLayout() ? 16 : 22;

      targetMap.addLayer({
        id: "point-hitbox",
        type: "circle",
        source: "places",
        paint: {
          "circle-radius": isMobileLayout() ? 18 : 22,
          "circle-color": "rgba(0,0,0,0)"
        }
      });

      targetMap.addLayer({
        id: "point-hearts",
        type: "symbol",
        source: "places",
        layout: {
          "text-field": "❤",
          "text-font": ["Open Sans Bold", "Arial Unicode MS Bold"],
          "text-size": heartSize,
          "text-anchor": "center",
          "text-offset": [0, 0],
          "text-allow-overlap": true,
          "text-ignore-placement": true
        },
        paint: {
          "text-color": "#b84b68",
          "text-halo-color": "#ffffff",
          "text-halo-width": 2.4
        }
      });

      targetMap.addLayer({
        id: "point-numbers",
        type: "symbol",
        source: "places",
        layout: {
          "text-field": ["to-string", ["get", "id"]],
          "text-font": ["Open Sans Bold", "Arial Unicode MS Bold"],
          "text-size": numberSize,
          "text-anchor": "center",
          "text-offset": [0, 0],
          "text-allow-overlap": true,
          "text-ignore-placement": true
        },
        paint: {
          "text-color": "#ffffff",
          "text-halo-color": "rgba(74, 32, 46, 0.55)",
          "text-halo-width": 0.8
        }
      });

      targetMap.addLayer({
        id: "kentucky-label-layer",
        type: "symbol",
        source: "kentucky-label",
        layout: {
          "text-field": ["get", "name"],
          "text-font": ["Open Sans Bold", "Arial Unicode MS Bold"],
          "text-size": kentuckyLabelSize,
          "text-letter-spacing": 0.20,
          "text-anchor": "center",
          "text-allow-overlap": true,
          "text-ignore-placement": true
        },
        paint: {
          "text-color": "rgba(95, 95, 95, 0.46)",
          "text-halo-color": "rgba(255,255,255,0.88)",
          "text-halo-width": 1.6
        }
      });

      targetMap.addLayer({
        id: "ohio-river-label-layer",
        type: "symbol",
        source: "ohio-river-label",
        layout: {
          "text-field": ["get", "name"],
          "text-font": ["Open Sans Italic", "Arial Unicode MS Regular"],
          "text-size": riverLabelSize,
          "text-letter-spacing": 0.18,
          "text-anchor": "center",
          "text-rotate": -50,
          "text-allow-overlap": true,
          "text-ignore-placement": true
        },
        paint: {
          "text-color": "rgba(46, 76, 98, 0.84)",
          "text-halo-color": "rgba(255,255,255,0.82)",
          "text-halo-width": 1.3
        }
      });

      const baseLabelLayers = layers
        .map(l => l.id)
        .filter(id => id && (id.includes("settlement") || id.includes("place-label")));

      for (const id of baseLabelLayers) {
        try {
          targetMap.setFilter(id, [
            "all",
            ["!in", ["downcase", ["coalesce", ["get", "name"], ""]], ["literal", ["louisville"]]]
          ]);
        } catch (e) {}
      }
    }

    function createMap() {
      map = new mapboxgl.Map({
        container: "map",
        style: BASEMAPS[currentBasemap],
        center: [-85.67, 38.20],
        zoom: 9,
        preserveDrawingBuffer: true,
        attributionControl: false
      });

      map.addControl(new mapboxgl.NavigationControl(), "top-right");

      map.on("load", () => {
        applyMapStyling(map);
        bindMapInteractions(map);
        fitAll();
      });
    }

    function changeBasemap(basemapKey) {
      if (!BASEMAPS[basemapKey] || basemapKey === currentBasemap) return;

      const selectedOrderBefore = selectedOrder;
      currentBasemap = basemapKey;

      if (activePopup) {
        activePopup.remove();
        activePopup = null;
      }

      map.setStyle(BASEMAPS[basemapKey]);

      map.once("style.load", () => {
        applyMapStyling(map);
        bindMapInteractions(map);

        if (selectedOrderBefore !== null) {
          const place = getPlaceByOrder(selectedOrderBefore);
          if (place) {
            setActiveListItem(selectedOrderBefore);
            map.easeTo({
              center: place.coordinates,
              zoom: isMobileLayout() ? 11.9 : 12.3,
              duration: 0,
              offset: isMobileLayout() ? [0, -60] : [180, 0]
            });
            openPopupForPlace(place);
          }
        } else {
          fitAll();
        }
      });
    }

    window.addEventListener("resize", () => {
      if (!map) return;
      map.resize();

      if (selectedOrder !== null) {
        const place = getPlaceByOrder(selectedOrder);
        if (place) {
          map.easeTo({
            center: place.coordinates,
            zoom: isMobileLayout() ? 11.9 : 12.3,
            duration: 0,
            offset: isMobileLayout() ? [0, -60] : [180, 0]
          });
        }
      } else {
        fitBoundsOnMap(map, false);
      }
    });

    populatePlacesList("places-list");
    populateExportPlacesList("export-places-list");
    createMap();

    async function exportHighResJPG() {
      const exportStage = document.getElementById("export-stage");
      exportStage.style.display = "block";

      const exportMap = new mapboxgl.Map({
        container: "export-map",
        style: BASEMAPS[currentBasemap],
        center: [-85.67, 38.20],
        zoom: 9,
        preserveDrawingBuffer: true,
        attributionControl: false,
        interactive: false
      });

      function waitForIdle(targetMap) {
        return new Promise((resolve) => {
          if (targetMap.loaded() && !targetMap.isMoving()) {
            targetMap.once("idle", resolve);
          } else {
            targetMap.once("idle", resolve);
          }
        });
      }

      exportMap.on("load", async () => {
        applyMapStyling(exportMap);
        fitBoundsOnMap(exportMap, true);

        await waitForIdle(exportMap);
        await new Promise(r => setTimeout(r, 1200));

        const mapCanvas = exportMap.getCanvas();

        const finalCanvas = document.createElement("canvas");
        finalCanvas.width = 5100;
        finalCanvas.height = 3300;

        const ctx = finalCanvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

        ctx.drawImage(mapCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

        const posterEl = document.getElementById("export-poster");
        const posterRect = posterEl.getBoundingClientRect();
        const stageRect = exportStage.getBoundingClientRect();

        const posterX = posterRect.left - stageRect.left;
        const posterY = posterRect.top - stageRect.top;
        const posterW = posterRect.width;
        const posterH = posterRect.height;

        ctx.fillStyle = "#fffdf9";
        roundRect(ctx, posterX, posterY, posterW, posterH, 66);
        ctx.fill();

        ctx.strokeStyle = "rgba(72, 52, 43, 0.14)";
        ctx.lineWidth = 2;
        roundRect(ctx, posterX, posterY, posterW, posterH, 66);
        ctx.stroke();

        drawPosterContent(ctx, posterX, posterY, posterW, posterH);

        const dataURL = finalCanvas.toDataURL("image/jpeg", 0.98);
        const link = document.createElement("a");
        link.href = dataURL;
        link.download = "Where-It-All-Began-11x17-300dpi.jpg";
        link.click();

        exportMap.remove();
        exportStage.style.display = "none";
      });
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawPosterContent(ctx, x, y, width, height) {
      const padX = 102;
      const topPad = 102;
      const contentX = x + padX;
      const contentW = width - (padX * 2);
      let cy = y + topPad;

      ctx.textAlign = "center";
      ctx.fillStyle = "#211815";

      ctx.font = "700 136px Georgia";
      ctx.fillText("Where It All Began", x + width / 2, cy + 92);
      cy += 150;

      ctx.fillStyle = "#6d6158";
      ctx.font = "600 68px Georgia";
      ctx.fillText("Louisville, Kentucky", x + width / 2, cy + 60);
      cy += 118;

      ctx.fillStyle = "#1f1a17";
      ctx.font = "700 72px Georgia";
      ctx.fillText("Adel & Salsabeel", x + width / 2, cy + 64);
      cy += 116;

      ctx.fillStyle = "#6d6158";
      ctx.font = "500 62px Inter, Arial, sans-serif";
      ctx.fillText("April 3–5, 2026", x + width / 2, cy + 56);
      cy += 98;

      const grad = ctx.createLinearGradient(contentX, cy, contentX + contentW, cy);
      grad.addColorStop(0, "rgba(184, 75, 104, 0)");
      grad.addColorStop(0.5, "rgba(184, 75, 104, 0.55)");
      grad.addColorStop(1, "rgba(184, 75, 104, 0)");
      ctx.fillStyle = grad;
      ctx.fillRect(contentX, cy, contentW, 3);
      cy += 72;

      ctx.textAlign = "left";

      for (const p of places) {
        const baseX = contentX;
        const heartX = baseX + 22;
        const heartY = cy + 24;

        drawHeartMarker(ctx, heartX, heartY, 36, "#b84b68");

        ctx.save();
        ctx.translate(heartX + 36, heartY + 36);
        ctx.rotate(Math.PI / 4);
        ctx.fillStyle = "#ffffff";
        ctx.font = "800 40px Inter, Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(String(p.order), 0, -6);
        ctx.restore();

        const textX = baseX + 126;
        ctx.fillStyle = "#1f1a17";
        ctx.font = "700 48px Inter, Arial, sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        wrapText(ctx, p.name, textX, cy, contentW - 140, 58);

        const nameHeight = measureWrappedTextHeight(ctx, p.name, contentW - 140, 58);

        ctx.fillStyle = "#8b5d6c";
        ctx.font = "italic 42px Georgia";
        wrapText(ctx, p.activity, textX, cy + nameHeight + 8, contentW - 140, 54);

        const activityHeight = measureWrappedTextHeight(ctx, p.activity, contentW - 140, 54);
        cy += Math.max(92, nameHeight + activityHeight + 28);
      }
    }

    function drawHeartMarker(ctx, x, y, size, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-Math.PI / 4);
      ctx.fillStyle = color;

      ctx.fillRect(0, 0, size * 2, size * 2);

      ctx.beginPath();
      ctx.arc(size, 0, size, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(size * 2, size, size, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(" ");
      let line = "";
      let cy = y;

      for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + " ";
        const metrics = ctx.measureText(testLine);
        const testWidth = metrics.width;

        if (testWidth > maxWidth && n > 0) {
          ctx.fillText(line.trim(), x, cy);
          line = words[n] + " ";
          cy += lineHeight;
        } else {
          line = testLine;
        }
      }

      if (line.trim()) {
        ctx.fillText(line.trim(), x, cy);
      }
    }

    function measureWrappedTextHeight(ctx, text, maxWidth, lineHeight) {
      const words = text.split(" ");
      let line = "";
      let lines = 1;

      for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + " ";
        const testWidth = ctx.measureText(testLine).width;

        if (testWidth > maxWidth && n > 0) {
          line = words[n] + " ";
          lines += 1;
        } else {
          line = testLine;
        }
      }

      return lines * lineHeight;
    }
  </script>
